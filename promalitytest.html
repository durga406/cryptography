<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCD</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #FF69B4; /* PINK */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #FF1493; }
        .result-area {
            margin-top: 20px;
            padding: 15px;
            background: #fff0f6;
            border-radius: 8px;
            color: #d63384;
            font-weight: bold;
            font-size: 18px;
            border: 1px dashed #FF69B4;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>GCD Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <button onclick="displayResult()">Calculate GCD</button>

    <div class="result-area" id="resultDisplay">
        Result will appear here
    </div>
</div>

<script>
    function calculate_gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);

        while (b) {
            let temp = b;
            b = a % b;
            a = temp;
        }
        return a;
    }


    function displayResult() {
        const n1 = parseInt(document.getElementById('num1').value);
        const n2 = parseInt(document.getElementById('num2').value);

        if (isNaN(n1) || isNaN(n2)) {
            document.getElementById('resultDisplay').innerText = "Please enter two numbers!";
            return;
        }

        const gcdValue = calculate_gcd(n1, n2);
        document.getElementById('resultDisplay').innerText = "The GCD is: " + gcdValue;
    }
</script>

</body>
</html>
                          Miller-Rabin Primality Test
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Miller-Rabin Primality Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #eef2f3; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccd1d1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #8e44ad; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #7d3c98; }
        #result { margin-top: 25px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .prime { background-color: #d4efdf; color: #1d8348; display: block !important; }
        .composite { background-color: #f9ebea; color: #922b21; display: block !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Primality Testing</h2>

        <label for="numN">Number to test (n):</label>
        <input type="number" id="numN" placeholder="e.g. 104729">

        <label for="numK">Iterations (k):</label>
        <input type="number" id="numK" value="40">

        <button onclick="runTest()">Run Miller-Rabin Test</button>

        <div id="result"></div>
    </div>

    <script>
        // Modular exponentiation (a^b % n) using BigInt
        function power(a, b, n) {
            let res = 1n;
            a = a % n;
            while (b > 0n) {
                if (b % 2n === 1n) res = (res * a) % n;
                a = (a * a) % n;
                b = b / 2n;
            }
            return res;
        }

        function millerRabin(n, k) {
            if (n <= 1n) return false;
            if (n <= 3n) return true;
            if (n % 2n === 0n) return false;

            // Decompose n-1 into 2^s * d
            let d = n - 1n;
            let s = 0n;
            while (d % 2n === 0n) {
                d /= 2n;
                s++;
            }

            for (let i = 0; i < k; i++) {
                // Generate random witness a in range [2, n-2]
                let a = BigInt(Math.floor(Math.random() * (Number(n) - 4))) + 2n;
                let x = power(a, d, n);

                if (x === 1n || x === n - 1n) continue;

                let composite = true;
                for (let r = 1n; r < s; r++) {
                    x = (x * x) % n;
                    if (x === n - 1n) {
                        composite = false;
                        break;
                    }
                }
                if (composite) return false;
            }
            return true;
        }

        function runTest() {
            const nInput = document.getElementById('numN').value;
            const kInput = document.getElementById('numK').value;
            const resultDiv = document.getElementById('result');

            if (!nInput || !kInput) {
                alert("Please fill in both fields");
                return;
            }

            const n = BigInt(nInput);
            const k = parseInt(kInput);

            const isPrime = millerRabin(n, k);

            resultDiv.className = isPrime ? 'prime' : 'composite';
            resultDiv.innerText = isPrime
                ? `Result: ${n} is probably prime.`
                : `Result: ${n} is composite.`;
        }
    </script>
</body>
</html>
                               Euclidean Algorithm - Division

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Euclidean Algorithm - Division</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #2c3e50; font-size: 1.2rem; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; color: #27ae60; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Euclidean Algorithm (Division)</h2>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <button onclick="calculateDivisionGCD()">Calculate GCD</button>
        <div id="result"></div>
    </div>

    <script>
        function calculateDivisionGCD() {
            let a = Math.abs(parseInt(document.getElementById('num1').value));
            let b = Math.abs(parseInt(document.getElementById('num2').value));

            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').innerText = "Please enter valid numbers.";
                return;
            }

            // Euclidean Algorithm (Division Method)
            while (b !== 0) {
                let temp = b;
                b = a % b;
                a = temp;
            }

            document.getElementById('result').innerText = "GCD is: " + a;
        }
    </script>
</body>
</html>
